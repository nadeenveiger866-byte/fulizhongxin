<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富里忠信</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#0b1f2e,#102f45);
font-family:"Microsoft JhengHei",sans-serif;
}

.card{
width:360px;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
text-align:center;
color:white;
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff2d55;
}

.name{
font-size:34px;
font-weight:bold;
margin-top:20px;
}

.button{
display:block;
margin-top:30px;
padding:18px;
background:#1388ff;
border-radius:18px;
text-decoration:none;
color:white;
font-size:22px;
font-weight:bold;
}

.button:hover{
opacity:.9;
}
</style>

</head>

<body>

<div class="card">

<img
class="avatar"
src="https://i.imgur.com/5XG5Q9M.jpeg">

<div class="name">
富里忠信
</div>

<a
class="button"
href="https://lin.ee/O2QqK8x">
🎁 補償領取入口
</a>

</div>

</body>
</html>
